name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build native helper
        run: gcc -O2 -s -o downloader native/bootstrap_helper.c

      - name: Run bootstrap helper
        run: |
          chmod +x build.sh downloader
          ./downloader

      - name: Run build script
        run: ./build.sh
